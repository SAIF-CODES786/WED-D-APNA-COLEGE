<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    apna &nbsp; college <br> <!-- &nbsp; is used for space -->
    &copy; 2024 Copyright <br>  <!-- &copy; is used for copyright -->
    5 &lt; 10 &gt; 2 <br>  <!-- &   lt; is used for less than and &gt; is used for greater than --> 
    50&#37; is half of 100&#37; <br>  <!-- &#37; is used for percentage -->     
    This is my &#36;100 <br>  <!-- &#36; is used for dollar sign -->
    This is my &#8377;100 <br>  <!-- &#8377; is used for rupee sign -->
    I am feeling &#128512; <br> <!-- &#128512; is used for smiley -->
    &amp; <br> <!--is used for and symbol  -->  
    &quot;This is my first web page&quot; <br>  <!-- &quot; is used for double quotes -->
    &apos;This is my first web page&apos; <br>  <!-- &apos; is used for single quotes -->
    &trade; <br> <!-- &trade; is used for trademark symbol -->
    &reg;<br>  <!-- &reg; is used for registered trademark symbol -->
    &euro; <br>  <!-- &euro; is used for euro sign -->
    &pound; <br> <!-- &pound; is used for pound sign -->
    this is &deg;C <br> <!-- &deg; is used for degree symbol -->
    This is &hellip; <br>  <!-- &hellip; is used for ellipsis -->
    <h>The sky is cloudy &#9729; &amp; it will rain &#9748; today. </h>
                                

    

</body>
</html>
