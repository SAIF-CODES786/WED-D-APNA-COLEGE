<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border=""black"">  <!-- border attribute is used to add border to the table -->
        <caption>Food Menu</caption>
        <!--Table Header-->
        <thead>
        <tr>
            <th>Item</th> <!-- <th> is used to create a header cell in the table -->
            <th>Quantity</th>
            <th>Price</th>
        </tr>
        </thead>
        <!--Table Body-->
        <tbody>
        <>
            <td>Pizza</td>
            <td>1</td>
            <td>$10</td>
        </tr> <!-- </tr> is used to close the row in the table -->
        <tr>
            <td>Burger</td>
            <td>2</td>
            <td>$8</td>
        </tr> <!--<tr> is used to create a new row in the table -->
        <tr>
            <td>Pasta</td> <!-- <td> is used to create a data cell in the table -->  
            <td>1</td>
            <td>$12</td>
        </tr>
        <tr>
            <td>Salad</td>
            <td>1</td>
            <td>$7</td>
        </tr>
        </tbody>
    </table>
    <table border ="black">
        <caption>Food Menu</caption>
        <thead>
            <tr>
             <th rowspan="2">Item</th>
             <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
                
            </tr>
        </thead>
        <tbody>
            <tr> 
                <td>Pizza</td>
                <td>1</td>
                <td>$10</td>
            </tr>
            <tr>
                <td>Burger</td>
                <td>2</td>
                <td>$8</td>
            </tr>
            <tr>
                <td>Pasta</td>  
                <td>1</td>
                <td>$12</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
