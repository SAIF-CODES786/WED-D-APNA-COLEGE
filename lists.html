<!DOCTYPE html>
<html lang="en"> // html tag with language attribute
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>
<body>
    <ul>
        <li>bread</li>
        <li>milk</li>
        <li>eggs</li>
        <li>fruits</li>
    </ul>
    <ol type ="A">
        <li>bread</li>
        <li>milk</li>
        <li>eggs</li>
        <li>fruits</li> 
    </ol>
</body>
</html>
